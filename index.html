<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Приглашение</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #FFFCF6;
      overflow-x: hidden;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      color: #1f1f1f;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .site {
      position: relative;
      z-index: 1;
    }
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
    /* ===== ПЕРВЫЙ ЭКРАН ===== */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background: #FFFCF6;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
      transition: opacity 1.1s ease, visibility 1.1s ease;
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 0;
    }

    .intro-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .intro-content {
      max-width: 360px;
      color: #111;
    }

    .intro-logo {
      font-family: 'Playfair Display', serif;
      font-size: 78px;
      line-height: 1;
      margin: 0 0 26px 0;
      letter-spacing: 1px;
    }

    .intro-quote {
      font-size: 19px;
      line-height: 1.55;
      margin: 0 0 10px 0;
    }

    .intro-ref {
      font-size: 16px;
      line-height: 1.4;
      margin: 0;
    }

    /* ===== ОБЩИЕ БЛОКИ ===== */
    .section {
      width: 100%;
      padding: 4px 0;
    }

    .section img.full {
      width: 100%;
    }

    .section.narrow {
      padding-left: 0;
      padding-right: 0;
    }

    /* ===== ГАЛЕРЕЯ ===== */
    .gallery-wrap {
      padding: 8px 10px 14px;
    }

    .gallery {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .gallery::-webkit-scrollbar {
      height: 6px;
    }

    .gallery::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,.18);
      border-radius: 999px;
    }

    .gallery-item {
      flex: 0 0 82%;
      scroll-snap-align: center;
      border-radius: 18px;
      overflow: hidden;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ===== ТАЙМЕР НА РУКАХ ===== */
    .hands-block {
      position: relative;
      width: 100%;
      overflow: hidden;
      margin-top: 4px;
    }

    .hands-block img {
      width: 100%;
      display: block;
    }

    .timer-title {
      position: absolute;
      top: 16%;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      line-height: 1.12;
      color: #111;
      z-index: 3;
    }

    .timer {
      position: absolute;
      top: 66%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      z-index: 3;
      color: #111;
    }

    .time-box {
      min-width: 74px;
      text-align: center;
    }

    .time-value {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      line-height: 1;
      font-weight: 400;
    }

    .time-label {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.1;
      letter-spacing: 0.4px;
    }

    .time-sep {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      line-height: 1;
      margin: 0 4px;
      color: rgba(0,0,0,.45);
    }

    /* ===== АНКЕТА ===== */
    .form-section {
      padding: 22px 18px 34px;
      text-align: center;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      line-height: 1.1;
      margin: 0 0 18px;
    }

    .form-card {
      background: rgba(255,255,255,0.58);
      border-radius: 24px;
      padding: 22px 16px 24px;
    }

    .guest-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .guest-form input[type="text"],
    .guest-form input[type="number"] {
      width: 100%;
      max-width: 420px;
      height: 54px;
      border: 1px solid #cfcfcf;
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      padding: 0 18px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: #1f1f1f;
      outline: none;
    }

    .radio-row {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: center;
      gap: 34px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
    }

    .radio-option input[type="radio"] {
      width: 22px;
      height: 22px;
    }

    .submit-btn {
      margin-top: 2px;
      min-width: 180px;
      height: 52px;
      border: 0;
      border-radius: 999px;
      background: #355b86;
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
    }

    .submit-note {
      min-height: 28px;
      margin: 6px 0 0;
      font-size: 20px;
    }

    .tg-block {
      padding-top: 18px;
      text-align: center;
    }

    .tg-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      line-height: 1.1;
      margin: 0 0 12px;
    }

    .tg-link {
      display: inline-block;
      text-decoration: none;
      color: #5a7396;
      font-size: 22px;
      line-height: 1.3;
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 430px) {
      .intro-logo {
        font-size: 72px;
      }

      .intro-quote {
        font-size: 18px;
      }

      .timer-title {
        font-size: 28px;
        top: 14%;
      }

      .time-box {
        min-width: 62px;
      }

      .time-value {
        font-size: 34px;
      }

      .time-sep {
        font-size: 38px;
        margin: 0 2px;
      }

      .time-label {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- МУЗЫКА -->
  <audio id="music" src="music.mp3" preload="auto"></audio>

  <!-- ПЕРВЫЙ ЭКРАН -->
  <div class="intro" id="intro">
    <video id="introVideo" autoplay muted loop playsinline webkit-playsinline preload="auto">
      <source src="fabric.mp4" type="video/mp4" />
    </video>

    <div class="intro-overlay">
      <div class="intro-content">
        <div class="intro-logo">A | V</div>
        <p class="intro-quote">
          «Отже, більше не буде їх двоє, а буде одна плоть, і нехай ніхто не роз’єднає тих, кого Бог з’єднав разом».»
‭‭ ‭UMT‬‬<br>
          
        </p>
        <p class="intro-ref">(Від Матвія‬ ‭19‬:‭6‬)</p>
      </div>
    </div>
  </div>

  <!-- САЙТ -->
  <div class="site">

    <section class="section fade">
      <img class="full" src="Photo1.jpg" alt="">
    </section>

   <section class="section fade">
      <img class="full" src="Photo2.PNG" alt="">
    </section>

    <section class="section fade">
      <img class="full" src="Photo3.PNG" alt="">
    </section>

   <section class="section fade">
      <img class="full" src="Photo4.PNG" alt="">
    </section>

    <!-- ГАЛЕРЕЯ -->
    <section class="gallery-wrap">
      <div class="gallery">
        <div class="gallery-item"><img src="P1.JPG" alt=""></div>
        <div class="gallery-item"><img src="P2.JPG" alt=""></div>
        <div class="gallery-item"><img src="P3.JPG" alt=""></div>
        <div class="gallery-item"><img src="P4.JPG" alt=""></div>
      </div>
    </section>

    <section class="section fade">
      <img class="full" src="Photo5.jpg" alt="">
    </section>

    <!-- РУКИ + ТАЙМЕР -->
    <section class="section narrow">
      <div class="hands-block">
        <img src="Hand.jpg" alt="">

        <div class="timer-title">
          До того, як ми станемо сім'єю,
…<br>залишилося…
        </div>

        <div class="timer" id="timer"></div>
      </div>
    </section>

    <!-- АНКЕТА -->
    <section class="form-section">
      <h2 class="form-title">Анкета гостя</h2>

      <div class="form-card">
        <form class="guest-form" id="guestForm">
          <input type="text" id="guestName" placeholder="Имя">

          <div class="radio-row">
            <label class="radio-option">
              <input type="radio" name="attendance" value="Да">
              <span>Да</span>
            </label>

            <label class="radio-option">
              <input type="radio" name="attendance" value="Нет">
              <span>Нет</span>
            </label>
          </div>

          <input type="number" id="guestCount" placeholder="Количество">

          <button type="submit" class="submit-btn">Отправить</button>
          <div class="submit-note" id="submitNote"></div>
        </form>
      </div>

      <div class="tg-block">
        <h3 class="tg-title">Общая группа</h3>
        <a class="tg-link" href="https://t.me/+s59jP9LBAQQzNmE6" target="_blank">
          Перейти в Telegram
        </a>
      </div>
    </section>

  </div>

  <script>
    // Первый экран: исчезает после нажатия + музыка с 11 сек
    const intro = document.getElementById('intro');
    const music = document.getElementById('music');

    intro.addEventListener('click', () => {
      intro.classList.add('hide');
      try {
        music.currentTime = 11;
        music.play();
      } catch (e) {}
    }, { once: true });

    // Таймер
    const targetDate = new Date('May 23, 2026 11:00:00').getTime();
    const timer = document.getElementById('timer');

    function renderTimer() {
      const now = new Date().getTime();
      let diff = targetDate - now;

      if (diff < 0) diff = 0;

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / (1000 * 60)) % 60);
      const s = Math.floor((diff / 1000) % 60);

      timer.innerHTML = `
        <div class="time-box">
          <div class="time-value">${d}</div>
          <div class="time-label">дней</div>
        </div>
        <div class="time-sep">|</div>
        <div class="time-box">
          <div class="time-value">${String(h).padStart(2,'0')}</div>
          <div class="time-label">часов</div>
        </div>
        <div class="time-sep">|</div>
        <div class="time-box">
          <div class="time-value">${String(m).padStart(2,'0')}</div>
          <div class="time-label">минут</div>
        </div>
        <div class="time-sep">|</div>
        <div class="time-box">
          <div class="time-value">${String(s).padStart(2,'0')}</div>
          <div class="time-label">секунд</div>
        </div>
      `;
    }

    renderTimer();
    setInterval(renderTimer, 1000);

    // Анкета → Telegram
    const guestForm = document.getElementById('guestForm');
    const submitNote = document.getElementById('submitNote');

    guestForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('guestName').value.trim();
      const count = document.getElementById('guestCount').value.trim();
      const attendanceInput = document.querySelector('input[name="attendance"]:checked');
      const attendance = attendanceInput ? attendanceInput.value : '';

      const message =
`Новая анкета
Имя: ${name || '-'}
Будет: ${attendance || '-'}
Количество: ${count || '-'}`;

      try {
        await fetch('https://api.telegram.org/bot8516218775:AAFz39TECTa2LTRbWymgGjWJ6nu5n308VXM/sendMessage', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            chat_id: '1808023543',
            text: message
          })
        });

        submitNote.textContent = 'Спасибо за ваш ответ 💛';
        guestForm.reset();
      } catch (err) {
        submitNote.textContent = 'Не удалось отправить ответ';
      }
    });
    const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

faders.forEach(el => observer.observe(el));
  </script>
</body>
</html>
